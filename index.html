<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Presupuesto</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-logo">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="40" height="40" rx="8" fill="#2563eb"/>
                        <path d="M8 12h10c5.5 0 9 3.5 9 9s-3.5 9-9 9H8V12z" fill="white"/>
                        <rect x="22" y="20" width="10" height="10" fill="white" opacity="0.5"/>
                    </svg>
                </div>
                <div>
                    <p class="brand-name">PRESUPUESTOS</p>
                    <p class="brand-sub">Generador Profesional</p>
                </div>
            </div>

            <div class="section-title">Datos del Cliente</div>

            <div class="field-group">
                <label>Para quién va dirigido</label>
                <input type="text" id="clientName" placeholder="Nombre del cliente" />
            </div>

            <div class="section-title" style="margin-top:28px;">Configuración</div>

            <div class="field-group">
                <label>Número de presupuesto</label>
                <input type="text" id="budgetNumber" placeholder="0001" value="0484" />
            </div>

            <div class="field-group">
                <label>Fecha de emisión</label>
                <input type="date" id="issueDate" />
            </div>

            <div class="field-group">
                <label>Válido hasta</label>
                <input type="date" id="validDate" />
            </div>

            <div class="section-title" style="margin-top:28px;">Encabezado del Emisor</div>

            <div class="field-group">
                <label>Nota al pie (opcional)</label>
                <textarea id="footerNote" rows="3" placeholder="Ej: Emitimos factura C. Válido hasta..."></textarea>
            </div>

            <div class="field-group">
                <label>Equipamiento / Info adicional</label>
                <textarea id="equipment" rows="4" placeholder="Ej: -Cámaras 4K&#10;-Drone DJI&#10;-Trípodes"></textarea>
            </div>

            <button class="generate-btn" onclick="generatePDF()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                Generar PDF
            </button>
        </aside>

        <main class="main-panel">
            <div class="panel-header">
                <h2>Ítems del Presupuesto</h2>
                <button class="add-item-btn" onclick="addItem()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Agregar ítem
                </button>
            </div>

            <div class="items-table">
                <div class="table-header">
                    <span class="col-item">Ítem #</span>
                    <span class="col-desc">Descripción</span>
                    <span class="col-price">Precio</span>
                    <span class="col-qty">Cant.</span>
                    <span class="col-total">Total</span>
                    <span class="col-action"></span>
                </div>
                <div id="itemsContainer">
                    <!-- Items added dynamically -->
                </div>
            </div>

            <div class="totals-bar">
                <div class="totals-left">
                    <span>Total calculado automáticamente</span>
                </div>
                <div class="totals-right">
                    <span class="total-label">TOTAL</span>
                    <span class="total-amount" id="totalDisplay">$ 0</span>
                </div>
            </div>

            <div id="pdfPreview" class="pdf-preview-area" style="display:none;">
                <div class="preview-bar">
                    <span>Vista previa del PDF</span>
                    <button class="download-btn" onclick="downloadPDF()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Descargar
                    </button>
                </div>
                <iframe id="pdfFrame" style="width:100%;height:600px;border:none;border-radius:0 0 12px 12px;"></iframe>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
